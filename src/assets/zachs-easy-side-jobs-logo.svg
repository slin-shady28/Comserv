<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">Zach's Easy Side Jobs logo</title>
  <desc id="desc">A professional logo for a neighborhood outdoor services business.</desc>
  <defs>
    <linearGradient id="badge" x1="48" y1="26" x2="170" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="70" y1="58" x2="145" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="720" height="220" rx="28" fill="#f8fafc"/>
  <rect x="12" y="12" width="696" height="196" rx="22" fill="#ffffff" stroke="#dbe5df" stroke-width="2"/>

  <g transform="translate(36 32)">
    <rect x="0" y="0" width="156" height="156" rx="34" fill="url(#badge)"/>
    <path d="M31 111c24-54 57-69 96-72-2 45-25 75-73 86 14-22 33-39 56-51-31 9-57 31-79 64-4-9-4-18 0-27Z" fill="url(#accent)"/>
